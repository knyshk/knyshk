<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0900"/>
      <stop offset="60%" stop-color="#7A3500"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="50" r="120" fill="#FF9500" opacity="0.06"/>
  <circle cx="850" cy="200" r="80" fill="#FFD700" opacity="0.05"/>
  <circle cx="100" cy="200" r="100" fill="#FF9500" opacity="0.04"/>

  <!-- Grid lines -->
  <line x1="0" y1="50"  x2="1000" y2="50"  stroke="#FF9500" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="100" x2="1000" y2="100" stroke="#FF9500" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="150" x2="1000" y2="150" stroke="#FF9500" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="200" x2="1000" y2="200" stroke="#FF9500" stroke-width="0.4" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="#FF9500" stroke-width="0.4" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="260" stroke="#FF9500" stroke-width="0.4" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="260" stroke="#FF9500" stroke-width="0.4" opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="260" stroke="#FF9500" stroke-width="0.4" opacity="0.1"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="5" height="260" fill="#FF9500" opacity="0.8"/>
  <rect x="0" y="255" width="1000" height="5" fill="url(#wave1)"/>

  <!-- Handle tag -->
  <rect x="36" y="28" width="110" height="26" rx="4" fill="#FF9500" opacity="0.15" stroke="#FF9500" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="91" y="46" font-family="'Courier New', monospace" font-size="13" fill="#FFD700" text-anchor="middle" opacity="0.9">@knyshk</text>

  <!-- Main Name -->
  <text x="500" y="125"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="70"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="2">Kanishk Jain</text>

  <!-- Amber underline accent -->
  <rect x="340" y="135" width="320" height="3" rx="2" fill="#FF9500" opacity="0.8"/>

  <!-- Tagline -->
  <text x="500" y="175"
    font-family="'Courier New', monospace"
    font-size="15"
    fill="#FFD580"
    text-anchor="middle"
    letter-spacing="1"
    opacity="0.95">CS &amp; AI  ·  MERN Stack  ·  ML Engineer  ·  IIT Jammu Alumnus</text>

  <!-- Bottom dots -->
  <circle cx="460" cy="210" r="3" fill="#FF9500" opacity="0.6"/>
  <circle cx="480" cy="210" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="500" cy="210" r="3" fill="#FF9500" opacity="0.6"/>
  <circle cx="520" cy="210" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="540" cy="210" r="3" fill="#FF9500" opacity="0.6"/>
</svg>
